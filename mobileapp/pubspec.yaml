name: mobileapp
description: "A daily English communication coach for professional clarity, confidence, and pronunciation."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cached_network_image: ^3.3.1
  cupertino_icons: ^1.0.8
  dio: ^5.4.3
  fl_chart: ^0.68.0
  flutter_hooks: ^0.20.5
  flutter_local_notifications: ^21.0.0
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  google_fonts: ^6.2.1
  hooks_riverpod: ^2.5.1
  intl: ^0.19.0
  just_audio: ^0.9.38
  lottie: ^3.1.0
  permission_handler: ^11.3.1
  posthog_flutter: ^5.0.0
  purchases_flutter: ^8.0.0
  record: ^7.0.0
  shared_preferences: ^2.2.3
  supabase_flutter: ^2.5.0
  delightful_toast: ^1.1.0
  gap: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.9
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.4.0
  riverpod_lint: ^2.3.10

dependency_overrides:
